<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shiki-like Demo</title>
    <style>
      /* 颜色用CSS类定义，对应不同语法作用域 */
      .token-keyword {
        color: #0000ff;
        font-weight: bold;
      } /* 关键字 */
      .token-string {
        color: #008000;
      } /* 字符串 */
      .token-comment {
        color: #808080;
        font-style: italic;
      } /* 注释 */
      .token-ident {
        color: #000000;
      } /* 标识符（变量、函数名） */
      .token-number {
        color: #ff00ff;
      } /* 数字 */
      .token-punctuation {
        color: #800080;
      } /* 标点符号 */
      .token-whitespace {
        white-space: pre;
      } /* 空格专用，强制保留缩进和间隔 */
      .code-container {
        background: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 14px;
        white-space: pre-wrap;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="code-output" class="code-container"></div>

    <script>
      /**
       * 1. 定义简化版语法规则（贴合Shiki的TextMate语法理念，用正则匹配对应作用域）
       * 每个规则包含：匹配正则、对应的token类型（CSS类名）、状态转移（简化版有限状态机）
       */
      const grammarRules = {
        // 初始状态：默认匹配
        initial: [
          { regex: /(\/\/.*)/y, token: 'token-comment', state: 'initial' }, // 单行注释
          { regex: /(".*?"|'.*?')/y, token: 'token-string', state: 'initial' }, // 字符串（单/双引号）
          {
            regex: /(let|const|var|function|return|if|else|for|while)/y,
            token: 'token-keyword',
            state: 'initial'
          }, // 关键字
          { regex: /(\d+(\.\d+)?)/y, token: 'token-number', state: 'initial' }, // 数字（整数/小数）
          {
            regex: /([a-zA-Z_$][a-zA-Z0-9_$]*)/y,
            token: 'token-ident',
            state: 'initial'
          }, // 标识符
          {
            regex: /([;,.(){}[\]=+\-*\/<>])/y,
            token: 'token-punctuation',
            state: 'initial'
          }, // 标点符号
          { regex: /( +|\t+)/y, token: 'token-whitespace', state: 'initial' }, // 空格/制表符
          { regex: /(\n)/y, token: null, state: 'initial' } // 换行符（仅用于行号处理，不生成token）
        ]
      }

      /**
       * 2. 核心函数1：生成Token（贴合Shiki的有限状态机+语法作用域解析）
       * 需求适配：返回二维数组token[][], 按行区分；每个token包含line、col、type、value
       * @param {string} code - 输入的代码字符串
       * @returns {Array} - 二维Token数组，token[行索引][当前行的token]
       */
      function generateTokens(code) {
        console.time('generateTokens')
        const tokens = [[]] // 二维数组，初始第一行
        let pos = 0 // 当前解析位置（用索引代替slice，O(n)复杂度）
        let currentState = 'initial' // 有限状态机初始状态
        let currentLine = 1 // 当前行号（从1开始）
        let currentCol = 0 // 当前列号（从0开始，对应字符起始位置）
        const len = code.length
        const rules = grammarRules[currentState] // 提取到循环外，避免重复获取

        // 循环解析，直到所有代码解析完成
        while (pos < len) {
          let matched = false

          for (const rule of rules) {
            rule.regex.lastIndex = pos // 设置sticky正则的起始位置
            const match = rule.regex.exec(code)

            if (match) {
              const matchedText = match[0]
              const tokenLength = matchedText.length
              // 计算当前token的起始列和结束列（结束列=起始列+长度，不包含结束位置）
              const colStart = currentCol

              // 有token类型的都生成token（包括空格），不再过滤
              if (rule.token) {
                tokens[currentLine - 1].push({
                  line: currentLine, // 当前token所在行号
                  col: [colStart, currentCol + tokenLength], // [起始列, 结束列]
                  type: rule.token, // CSS类名，对应语法作用域
                  value: matchedText // 匹配到的文本内容（空格会完整保留）
                })
              }

              // 处理换行：如果匹配到换行符，新增一行，重置列号，行号+1
              if (matchedText === '\n') {
                currentLine++
                currentCol = 0
                tokens.push([]) // 新增一行的token数组
              } else {
                // 非换行，更新列号
                currentCol += tokenLength
              }

              // 状态转移（简化版，沿用当前状态，可扩展复杂嵌套语法）
              currentState = rule.state
              pos += tokenLength // 只更新索引，不创建新字符串
              matched = true
              break // 匹配到一个规则后，继续下一轮解析
            }
          }

          // 未匹配到任何规则时，跳过当前字符，更新列号（避免死循环）
          if (!matched) {
            currentCol++
            pos++
          }
        }

        // 仅过滤完全空的行，保留只有空格的缩进行，不破坏代码格式
        console.timeEnd('generateTokens')
        return tokens
      }

      /**
       * 3. 核心函数2：拼接HTML（将二维Token数组转换成带CSS类的HTML字符串，保留换行和缩进）
       * @param {Array} tokens - generateTokens生成的二维Token数组
       * @returns {string} - 可直接插入页面的HTML字符串
       */
      function renderTokensToHtml(tokens) {
        // 遍历每一行的token，拼接当前行内容，行与行之间添加换行符\n
        return tokens
          .map((lineTokens) => {
            return lineTokens
              .map((token) => {
                return `<span class="${token.type}">${escapeHtml(token.value)}</span>`
              })
              .join('')
          })
          .join('\n') // 行之间添加换行，配合CSS的pre-wrap实现正常换行
      }

      /**
       * 辅助函数：转义HTML特殊字符（不转义空格、换行，确保格式正常）
       * @param {string} str - 需要转义的文本
       * @returns {string} - 转义后的文本
       */
      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;')
      }

      // ------------------- 测试代码（可修改调试）-------------------
      const testCode = `const num1 = 123n; // BigInt
const num2 = 0b1010n; // 二进制BigInt
const num3 = 0x1Fn; // 十六进制BigInt
let price = 99.99;
var isOk = true;

// 2. ES2020 可选链?. + 空值合并??
const user = { name: "Alice", address: { city: "Beijing" } };
const city = user?.address?.city ?? "Unknown"; // 可选链+空值合并
const age = user?.age ?? 18;

// 3. ES2020 globalThis
console.log(globalThis === window); // 浏览器环境

// 4. 可选catch绑定（ES2020）
try {
  JSON.parse(invalidJson);
} catch { // 无参数的catch
  console.error("解析失败");
}

// 5. Promise.allSettled（ES2020）
const promises = [Promise.resolve(1), Promise.reject("error")];
Promise.allSettled(promises).then(results => {
  results.forEach(result => console.log(result.status));
});

// 6. 模块化（ES2020）
import { foo } from './module.js';
import * as utils from './utils.js';
export const bar = 123;
export * as ns from './ns.js';
const modulePath = './dynamic.js';
import(modulePath).then(mod => mod.hello()); // 动态导入

// 7. 类（ES6+，ES2020兼容）
class Person {
  static type = "Human";
  constructor(name) {
    this.name = name;
  }
  greet() {
    return \`Hello, \${this.name.toUpperCase()}!\`; // 模板插值
  }
}
class Student extends Person {
  constructor(name, grade) {
    super(name);
    this.grade = grade;
  }
}

// 8. async/await
async function fetchData(url) {
  try {
    const response = await fetch(url);
    const data = await response.json();
    return data;
  } catch (err) {
    console.error("请求失败：", err.message);
  }
}

// 9. 箭头函数
const double = (x) => x * 2;
const sum = (a, b) => {
  return a + b;
};

// 10. 字面量
const arr = [1, 2, 3, null, undefined];
const obj = {
  [\`key-\${123}\`]: "computed", // 计算属性
  method() { return "hello"; }
};

// 11. 运算符
const a = 10, b = 20;
const result = (a + b) * (a - b) === 0 && a || b;
`

      // 执行核心逻辑
      const tokens = generateTokens(testCode)
      const html = renderTokensToHtml(tokens)

      // 将结果插入页面，查看效果
      document.getElementById('code-output').innerHTML = html

      // 控制台打印二维Token数组（含行号、行列、空格token），方便调试查看
      console.log('生成的二维Token数组（按行区分，含空格token）：', tokens)
    </script>
  </body>
</html>
