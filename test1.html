<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shiki-like JS 完善版高亮Demo（支持ES2020）</title>
    <style>
        /* 颜色用CSS类定义，对应不同语法作用域，覆盖JS ES2020完整语法 */
        .token-keyword { color: #0000ff; font-weight: bold; } /* 关键字 */
        .token-string { color: #008000; } /* 单/双引号字符串 */
        .token-template { color: #a31515; } /* 模板字符串 */
        .token-template-interpolation { color: #0000ff; } /* 模板插值 */
        .token-comment { color: #808080; font-style: italic; } /* 单行/多行注释 */
        .token-ident { color: #000000; } /* 标识符（变量、函数名、属性名） */
        .token-number { color: #ff00ff; } /* 数字（整数/小数/负数） */
        .token-bigint { color: #990099; font-weight: bold; } /* ES2020 BigInt */
        .token-punctuation { color: #800080; } /* 标点符号（含ES2020新增符号） */
        .token-whitespace { white-space: pre; } /* 空格/制表符，保留格式 */
        .token-import { color: #0000ff; font-weight: bold; } /* import关键字 */
        .token-optional-chaining { color: #800080; font-weight: bold; } /* ES2020 可选链?. */
        .token-nullish-coalescing { color: #800080; font-weight: bold; } /* ES2020 空值合并?? */
        .code-container { 
            background: #f5f5f5; 
            padding: 16px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 14px; 
            white-space: pre-wrap; 
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="code-output" class="code-container"></div>

    <script>
        /**
         * 1. 完善JS语法规则（贴合Shiki的TextMate语法+有限状态机理念）
         * 修复：状态名改为驼峰式（避免JS语法错误），新增ES2020语法规则
         * 状态：initial（初始）、comment（多行注释）、template（模板字符串）、templateInterpolation（模板插值，修正命名）
         * 支持：ES2020语法+原有核心语法，含可选链、空值合并、BigInt等
         */
        const grammarRules = {
            // 初始状态：默认匹配（非注释、非模板字符串的正常JS语法）
            initial: [
                // 多行注释起始：匹配/*，进入comment状态
                { regex: /^(\/\*)/, token: 'token-comment', state: 'comment' },
                // 单行注释：匹配//，不进入新状态（单行结束自动终止）
                { regex: /^(\/\/.*)/, token: 'token-comment', state: 'initial' },
                // 模板字符串起始：匹配`，进入template状态
                { regex: /^(`)/, token: 'token-template', state: 'template' },
                // 双引号字符串（支持转义\"）
                { regex: /^("(\\.|[^"\\])*?")/, token: 'token-string', state: 'initial' },
                // 单引号字符串（支持转义\'）
                { regex: /^('(\\.|[^'\\])*?')/, token: 'token-string', state: 'initial' },
                // ES2020 BigInt（n后缀）
                { regex: /^(-?\d+n)/, token: 'token-bigint', state: 'initial' },
                // 数字（整数、小数、负数）
                { regex: /^(-?\d+(\.\d+)?)/, token: 'token-number', state: 'initial' },
                // ES2020 关键字/全局对象（globalThis、Promise等）
                { regex: /^(globalThis|Promise|Symbol|Array|Object|String|Number|Boolean)/, token: 'token-keyword', state: 'initial' },
                // 核心关键字（含ES2020相关）
                { regex: /^(let|const|var|function|return|if|else|for|while|switch|case|break|continue|class|export|default|try|catch|throw|async|await|static|async|await)/, token: 'token-keyword', state: 'initial' },
                // 动态导入import关键字
                { regex: /^(import)/, token: 'token-import', state: 'initial' },
                // 标识符（变量、函数名、属性名，支持下划线、$）
                { regex: /^([a-zA-Z_$][a-zA-Z0-9_$]*)/, token: 'token-ident', state: 'initial' },
                // ES2020 空值合并运算符??（修复正则语法错误：?需转义）
                { regex: /^(\?\?)/, token: 'token-nullish-coalescing', state: 'initial' },
                // ES2020 可选链运算符?.
                { regex: /^(\?\.)/, token: 'token-optional-chaining', state: 'initial' },
                // 标点符号（补充箭头函数=>、模板插值{}、ES2020新增符号等）
                { regex: /^([;,.(){}[\]=+\-*\/<>?|&^%!~=:=>])/, token: 'token-punctuation', state: 'initial' },
                // 空格/制表符：生成token，保留格式
                { regex: /^( +|\t+)/, token: 'token-whitespace', state: 'initial' },
                // 换行符：仅处理行号，不生成token
                { regex: /^(\n)/, token: null, state: 'initial' },
            ],
            // 多行注释状态：匹配到*/回到初始状态，中间内容均为注释
            comment: [
                { regex: /^(\*\/)/, token: 'token-comment', state: 'initial' },
                { regex: /^([^*/]+)/, token: 'token-comment', state: 'comment' },
                { regex: /^(\*|\/)/, token: 'token-comment', state: 'comment' },
            ],
            // 模板字符串状态：匹配到${进入插值状态，匹配到`回到初始状态
            template: [
                { regex: /^(`)/, token: 'token-template', state: 'initial' },
                { regex: /^(\$\{)/, token: 'token-template-interpolation', state: 'templateInterpolation' }, // 修正状态名
                { regex: /^(\\`|([^`\\$]+))/, token: 'token-template', state: 'template' },
            ],
            // 模板插值状态（修正命名：templateInterpolation，避免JS语法错误）：匹配到}回到模板状态
            templateInterpolation: [
                { regex: /^(\})/, token: 'token-template-interpolation', state: 'template' },
                // 插值内支持JS关键字、标识符、数字等正常语法，含ES2020语法
                { regex: /^(-?\d+n)/, token: 'token-bigint', state: 'templateInterpolation' },
                { regex: /^(let|const|var|function|return|if|else|async|await)/, token: 'token-keyword', state: 'templateInterpolation' },
                { regex: /^(-?\d+(\.\d+)?)/, token: 'token-number', state: 'templateInterpolation' },
                { regex: /^([a-zA-Z_$][a-zA-Z0-9_$]*)/, token: 'token-ident', state: 'templateInterpolation' },
                // ES2020 空值合并运算符??（修复正则语法错误：?需转义）
                { regex: /^(\?\?)/, token: 'token-nullish-coalescing', state: 'templateInterpolation' },
                { regex: /^(\?\.)/, token: 'token-optional-chaining', state: 'templateInterpolation' },
                { regex: /^([;,.(){}[\]=+\-*\/<>?|&^%!~=:])/, token: 'token-punctuation', state: 'templateInterpolation' },
                { regex: /^( +|\t+)/, token: 'token-whitespace', state: 'templateInterpolation' },
            ]
        };

        /**
         * 2. 核心函数1：生成Token（完善有限状态机，支持多状态转移，修复rules迭代错误）
         * 保持：二维数组token[][], 按行区分；每个token包含line、col、type、value
         * @param {string} code - 输入的JS代码字符串
         * @returns {Array} - 二维Token数组，token[行索引][当前行的token]
         */
        function generateTokens(code) {
            const tokens = [[]]; // 二维数组，初始第一行
            let remainingCode = code; // 剩余未解析的代码
            let currentState = 'initial'; // 有限状态机初始状态
            let currentLine = 1; // 当前行号（从1开始）
            let currentCol = 0; // 当前列号（从0开始，对应字符起始位置）

            // 循环解析，直到所有代码解析完成
            while (remainingCode.length > 0) {
                let matched = false;
                // 修复：增加兜底，避免currentState不存在导致rules为undefined（解决rules is not iterable）
                const rules = grammarRules[currentState] || grammarRules.initial;

                for (const rule of rules) {
                    const match = remainingCode.match(rule.regex);
                    if (match) {
                        const [matchedText] = match;
                        const tokenLength = matchedText.length;
                        // 计算当前token的起始列和结束列（结束列=起始列+长度，不包含结束位置）
                        const colStart = currentCol;
                        const colEnd = currentCol + tokenLength;

                        // 有token类型的都生成token（包括空格），不过滤任何有效内容
                        if (rule.token) {
                            tokens[currentLine - 1].push({
                                line: currentLine, // 当前token所在行号
                                col: [colStart, colEnd], // [起始列, 结束列]
                                type: rule.token, // CSS类名，对应语法作用域
                                value: matchedText // 匹配到的文本内容（空格、注释、模板等均完整保留）
                            });
                        }

                        // 处理换行：如果匹配到换行符，新增一行，重置列号，行号+1
                        if (matchedText === '\n') {
                            currentLine++;
                            currentCol = 0;
                            tokens.push([]); // 新增一行的token数组
                        } else {
                            // 非换行，更新列号
                            currentCol = colEnd;
                        }

                        // 状态转移：根据规则切换到目标状态（贴合Shiki状态栈理念，简化实现）
                        currentState = rule.state;
                        // 截取剩余未解析的代码
                        remainingCode = remainingCode.slice(tokenLength);
                        matched = true;
                        break; // 匹配到一个规则后，继续下一轮解析
                    }
                }

                // 未匹配到任何规则时，跳过当前字符，更新列号（避免死循环）
                if (!matched) {
                    currentCol++;
                    remainingCode = remainingCode.slice(1);
                }
            }

            // 保留所有行（包括只有空格的缩进行），不破坏代码原始格式
            return tokens.filter(lineTokens => lineTokens.length > 0 || currentLine > 1);
        }

        /**
         * 3. 核心函数2：拼接HTML（修复高亮失效问题，适配ES2020新增token类型）
         * @param {Array} tokens - generateTokens生成的二维Token数组
         * @returns {string} - 可直接插入页面的HTML字符串
         */
        function renderTokensToHtml(tokens) {
            // 遍历每一行的token，拼接当前行内容，行与行之间添加换行符\n
            return tokens.map(lineTokens => {
                return lineTokens.map(token => {
                    return `<span class="${token.type}">${escapeHtml(token.value)}</span>`;
                }).join('');
            }).join('\n'); // 行之间添加换行，配合CSS的pre-wrap实现正常换行
        }

        /**
         * 辅助函数：转义HTML特殊字符（修复转义错误，确保格式正常）
         * @param {string} str - 需要转义的文本
         * @returns {string} - 转义后的文本
         */
        function escapeHtml(str) {
            // 修复：&正确转义为&amp;，避免转义失效导致样式异常
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&apos;');
        }

        // ------------------- 测试代码（覆盖ES2020语法+原有语法，可修改调试）-------------------
        const testCode = `// 单行注释：测试完善版JS高亮（支持ES2020）
/* 多行注释测试
   跨越多行
   包含特殊符号 /* */ */
function add(a, b) {
    const sum = a + b;
    if (sum > 10) {
        return \`插值测试：sum = \${sum + 5n}\`; // 模板字符串+插值+ES2020 BigInt
    } else {
        return '带转义的单引号：\\'test\\''; // 单引号转义
    }
}

// ES2020 动态导入测试
const module = import('./test.js');
// ES2020 可选链运算符测试（?.）
const user = { name: 'test', address: { city: 'beijing' } };
const city = user?.address?.city; // 可选链，避免报错
// ES2020 空值合并运算符测试（??）
const age = null ?? 18; // 空值合并，null/undefined时取默认值
// ES2020 BigInt测试
const bigNum = 100n;
const bigSum = bigNum + 50n;
// ES2020 globalThis测试
console.log(globalThis === window); // 全局对象
// 箭头函数测试
const multiply = (x, y) => x * y;
// async/await测试（ES2017，兼容ES2020）
async function fetchData() {
    try {
        const res = await fetch('/api/data');
        return await res.json();
    } catch (err) {
        console.error(err);
    }
}

// 模板字符串跨行测试
const templateStr = \`这是一个
跨行的模板字符串
包含ES2020插值：\${bigSum ?? 0n}\`;`;

        // 执行核心逻辑
        const tokens = generateTokens(testCode);
        const html = renderTokensToHtml(tokens);

        // 将结果插入页面，查看效果
        document.getElementById('code-output').innerHTML = html;

        // 控制台打印二维Token数组（含ES2020语法的token、行列信息），方便调试查看
        console.log('完善版二维Token数组（支持ES2020，按行区分）：', tokens);
    </script>
</body>
</html>
