<script>
    /**
 * 完整版：支持ES2020所有核心语法的FSM+纯文本语法解析高亮Demo
 * 核心：栈式有限状态机 + 上下文敏感的纯文本解析 + ES2020语法规则

 debugger
class ES2020SyntaxHighlighter {
  constructor() {
    // 1. 状态栈：维护当前解析上下文（核心）
    this.stateStack = ['global'];

    // 2. 语法规则：按优先级排序（先匹配的规则生效）
    // 规则格式：{ regex: 匹配正则, scope: 语法作用域, pushState: 压栈状态, popState: 弹栈, skip: 是否跳过（仅状态切换） }
    this.rules = {
      // 全局状态：解析所有顶层语法
      global: [
        // === 注释规则 ===
        { regex: /^\/\/.*/, scope: 'comment.line.double-slash.js' }, // 单行注释
        { regex: /^\/\*/, scope: 'comment.block.js', pushState: 'multiline-comment' }, // 多行注释开始

        // === 模块化语法（ES2020） ===
        { regex: /^(import)\s*\(/, scope: 'keyword.control.import.js', pushState: 'import-dynamic' }, // import()动态导入
        { regex: /^(import|export)\b/, scope: 'keyword.control.module.js' }, // import/export关键字
        { regex: /^(export)\s*\*\s*as\s*(\w+)\s*from/, scope: 'keyword.control.module.js' }, // export * as ns from

        // === ES2020关键字/全局变量 ===
        { regex: /^(globalThis)\b/, scope: 'variable.language.global-this.js' }, // globalThis
        { regex: /^(Promise\.allSettled)\b/, scope: 'support.function.promise.js' }, // Promise.allSettled

        // === 控制流/声明关键字 ===
        { regex: /^(if|else|for|while|do|switch|case|break|continue|return|throw|try|catch|finally)\b/, scope: 'keyword.control.js' },
        { regex: /^(async|await)\b/, scope: 'keyword.control.async.js' }, // async/await
        { regex: /^(class|extends|static|constructor)\b/, scope: 'keyword.control.class.js' }, // 类相关
        { regex: /^(function|var|let|const)\b/, scope: 'keyword.declaration.js' }, // 变量/函数声明
        { regex: /^(true|false)\b/, scope: 'constant.language.boolean.js' }, // 布尔值
        { regex: /^(null|undefined)\b/, scope: 'constant.language.null.js' }, // null/undefined

        // === 运算符（ES2020新增） ===
        { regex: /^(\?\.)/, scope: 'operator.optional-chaining.js' }, // 可选链?.
        { regex: /^(\?\?)/, scope: 'operator.nullish-coalescing.js' }, // 空值合并??
        { regex: /^(===|!==|==|!=|&&|\|\||\+\+|--|\+|-|\*|\/|%|=|>|<|>=|<=|!|\.|,|:|;|\(|\)|\{|\}|\[|\])/, scope: 'operator.js' }, // 基础运算符

        // === 值类型 ===
        { regex: /^(0b[01]+n?|0o[0-7]+n?|0x[0-9a-fA-F]+n?|\d+\.?\d*e?\d*n?|\.\d+e?\d*n?)/, scope: 'constant.numeric.js' }, // 数字（含BigInt 123n）
        { regex: /^`/, scope: 'string.quoted.backtick.js', pushState: 'string-backtick' }, // 反引号字符串
        { regex: /^"/, scope: 'string.quoted.double.js', pushState: 'string-double' }, // 双引号字符串
        { regex: /^'/, scope: 'string.quoted.single.js', pushState: 'string-single' }, // 单引号字符串

        // === 箭头函数 ===
        { regex: /^=>/, scope: 'operator.arrow-function.js' },

        // === 标识符（普通变量/函数名） ===
        { regex: /^[a-zA-Z_$][a-zA-Z0-9_$]*/, scope: 'variable.identifier.js' }
      ],

      // 多行注释状态：/* ... */
      'multiline-comment': [
        { regex: /^[\s\S]*?\*\//, scope: 'comment.block.js', popState: true }, // 多行注释结束
        { regex: /^[\s\S]*/, scope: 'comment.block.js' } // 未闭合的多行注释
      ],

      // 双引号字符串状态（处理转义）
      'string-double': [
        { regex: /^[^\\"]*(?:\\.[^\\"]*)*"/, scope: 'string.quoted.double.js', popState: true }, // 字符串结束
        { regex: /^.*/, scope: 'string.quoted.double.js' } // 未闭合的字符串
      ],

      // 单引号字符串状态（处理转义）
      'string-single': [
        { regex: /^[^\\']*(?:\\.[^\\']*)*'/, scope: 'string.quoted.single.js', popState: true }, // 字符串结束
        { regex: /^.*/, scope: 'string.quoted.single.js' } // 未闭合的字符串
      ],

      // 反引号模板字符串状态（含插值）
      'string-backtick': [
        { regex: /^\$\{/, scope: 'punctuation.definition.template-expression.js', pushState: 'template-interpolation' }, // 插值开始${
        { regex: /^[^\\`\$]+/, scope: 'string.quoted.backtick.js' }, // 普通字符串内容（不包含\、`、$）
        { regex: /^\\./, scope: 'string.quoted.backtick.js' }, // 转义字符
        { regex: /^\$/, scope: 'string.quoted.backtick.js' }, // 单独的$（不是${）
        { regex: /^`/, scope: 'string.quoted.backtick.js', popState: true } // 字符串结束
      ],

      // 模板插值状态（${}内的 JS 代码）
      'template-interpolation': [
        { regex: /^}/, scope: 'punctuation.definition.template-expression.js', popState: true }, // 插值结束}
        // 复用全局规则的核心语法（关键字/运算符/字符串等）
        { regex: /^(if|else|const|let|var|async|await)\b/, scope: 'keyword.control.js' },
        { regex: /^(true|false|null|undefined)\b/, scope: 'constant.language.js' },
        { regex: /^(\?\.)|(\?\?)/, scope: 'operator.js' },
        { regex: /^"/, scope: 'string.quoted.double.js', pushState: 'string-double' },
        { regex: /^'/, scope: 'string.quoted.single.js', pushState: 'string-single' },
        { regex: /^\d+n?/, scope: 'constant.numeric.js' },
        { regex: /^[a-zA-Z_$][a-zA-Z0-9_$]*/, scope: 'variable.identifier.js' },
        { regex: /^[+\-*/=<>!&|.,;:()[\]]/, scope: 'operator.js' }, // 包含括号
        { regex: /^\{/, scope: 'operator.js' }, // 左大括号
        { regex: /^./, scope: 'variable.identifier.js' } // 兜底
      ],

      // 动态导入import()状态
      'import-dynamic': [
        { regex: /^\)/, scope: 'operator.js', popState: true }, // 括号结束，回到全局
        { regex: /^"/, scope: 'string.quoted.double.js', pushState: 'string-double' }, // 模块路径
        { regex: /^'/, scope: 'string.quoted.single.js', pushState: 'string-single' }, // 模块路径
        { regex: /^[a-zA-Z_$][a-zA-Z0-9_$]*/, scope: 'variable.identifier.js' }, // 变量
        { regex: /^[+\-*/=<>!&|.,;:()[\]{}]/, scope: 'operator.js' }, // 运算符
        { regex: /^./, scope: 'variable.identifier.js' } // 兜底
      ]
    };

    // 3. 作用域→样式映射（模拟VS Code主题）
    this.scopeToStyle = {
      // 注释
      'comment.line.double-slash.js': 'color: #6A9955;',
      'comment.block.js': 'color: #6A9955; font-style: italic;',
      // 关键字
      'keyword.control.js': 'color: #569CD6;',
      'keyword.control.async.js': 'color: #C586C0;',
      'keyword.control.class.js': 'color: #569CD6; font-weight: bold;',
      'keyword.declaration.js': 'color: #569CD6;',
      'keyword.control.module.js': 'color: #569CD6;',
      // 常量/值
      'constant.language.boolean.js': 'color: #569CD6;',
      'constant.language.null.js': 'color: #569CD6;',
      'constant.numeric.js': 'color: #B5CEA8;',
      'variable.language.global-this.js': 'color: #C586C0; font-weight: bold;',
      // 字符串
      'string.quoted.double.js': 'color: #CE9178;',
      'string.quoted.single.js': 'color: #CE9178;',
      'string.quoted.backtick.js': 'color: #CE9178;',
      // 运算符
      'operator.js': 'color: #D4D4D4;',
      'operator.optional-chaining.js': 'color: #DCDCAA; font-weight: bold;',
      'operator.nullish-coalescing.js': 'color: #DCDCAA; font-weight: bold;',
      'operator.arrow-function.js': 'color: #DCDCAA;',
      // 模板插值
      'punctuation.definition.template-expression.js': 'color: #C586C0;',
      'source.js.template-interpolation': 'color: #D4D4D4;',
      // 标识符/函数
      'variable.identifier.js': 'color: #9CDCFE;',
      'support.function.promise.js': 'color: #DCDCAA; font-weight: bold;',
      // 默认样式
      'default': 'color: #D4D4D4;'
    };
  }

 
    /**
   * 核心改造：解析代码为带行列属性的二维 Token 数组
   * @param {string} code 要解析的ES2020代码
   * @returns {Array<Array<{ text: string, scope: string, line: number, col: [number, number] }>>} 带行列的二维 Token 数组
   */
  parse(code) {
    const rows = []; // 最终的二维数组（行）
    let currentRowTokens = []; // 当前行的 Token 列表
    let remainingCode = code;
    const lineBreakRegex = /^\r?\n/; // 匹配换行符（\n 或 \r\n）

    // 行列状态：1-based 索引
    let currentLine = 1; // 当前行号（初始为第1行）
    let currentCol = 1; // 当前列号（初始为第1列）

    while (remainingCode.length > 0) {
      // 1. 优先处理换行符：切换到下一行
      const lineBreakMatch = lineBreakRegex.exec(remainingCode);
      if (lineBreakMatch) {
        const lineBreakText = lineBreakMatch[0];
        // 生成换行符 Token（带行列）
        const lineBreakToken = {
          text: lineBreakText,
          scope: 'default',
          line: currentLine,
          col: [currentCol, currentCol + lineBreakText.length - 1] // 换行符列范围
        };
        currentRowTokens.push(lineBreakToken);

        // 换行后：行号+1，列号重置为1
        rows.push(currentRowTokens);
        currentRowTokens = [];
        currentLine += 1;
        currentCol = 1;

        // 截断剩余代码
        remainingCode = remainingCode.slice(lineBreakText.length);
        continue;
      }

      const currentState = this.stateStack[this.stateStack.length - 1];
      const stateRules = this.rules[currentState];
      let matched = false;

      // 2. 遍历规则匹配 Token
      for (const rule of stateRules) {
        const match = rule.regex.exec(remainingCode);
        if (match) {
          const matchedText = match[0];
          
          // 检查是否跨行（包含换行符）
          if (matchedText.includes('\n')) {
            // 拆分跨行 Token，并补充行列属性
            const splitTokens = this.splitTokenByLineBreak(matchedText, rule.scope, currentLine, currentCol);
            // 处理拆分后的每个 Token
            splitTokens.forEach((splitToken) => {
              if (splitToken.text.includes('\n')) {
                // 换行符 Token：加入当前行，切换行号/列号
                currentRowTokens.push(splitToken);
                rows.push(currentRowTokens);
                currentRowTokens = [];
                currentLine += 1;
                currentCol = 1;
              } else {
                // 普通 Token：加入当前行，更新列号
                currentRowTokens.push(splitToken);
                currentCol = splitToken.col[1] + 1; // 列号推进到 Token 结束列+1
              }
            });
          } else {
            // 非跨行 Token：生成行列属性
            const token = {
              text: matchedText,
              scope: rule.scope,
              line: currentLine,
              col: [currentCol, currentCol + matchedText.length - 1] // 起始列=当前列，结束列=当前列+长度-1
            };
            currentRowTokens.push(token);
            // 更新当前列号（推进到 Token 结束列+1）
            currentCol = token.col[1] + 1;
          }

          // 截断剩余代码
          remainingCode = remainingCode.slice(matchedText.length);
          
          // 处理状态栈
          if (rule.pushState) this.stateStack.push(rule.pushState);
          if (rule.popState) this.stateStack.pop();

          matched = true;
          break;
        }
      }

      // 3. 无匹配规则：取单个字符作为兜底
      if (!matched) {
        const char = remainingCode[0];
        const token = {
          text: char,
          scope: 'default',
          line: currentLine,
          col: [currentCol, currentCol] // 单个字符，起始=结束列
        };
        currentRowTokens.push(token);
        // 更新列号
        currentCol += 1;
        remainingCode = remainingCode.slice(1);
      }
    }

    // 4. 把最后一行（无换行符结尾）加入总行数组
    if (currentRowTokens.length > 0) {
      rows.push(currentRowTokens);
    }

    // 重置状态栈
    this.stateStack = ['global'];
    return rows; // 返回带行列的二维 Token 数组
  }
  
 /**
   * 辅助方法：拆分包含换行符的 Token 并补充行列属性
   * @param {string} text 包含换行符的 Token 文本
   * @param {string} scope Token 作用域
   * @param {number} startLine 起始行号
   * @param {number} startCol 起始列号
   * @returns {Array<{ text: string, scope: string, line: number, col: [number, number] }>} 拆分后的 Token 列表
   */
splitTokenByLineBreak(text, scope, startLine, startCol) {
  const tokens = [];
  let remaining = text;
  let currentLine = startLine;
  let currentCol = startCol; // 初始列号，严格同步

  while (remaining.length > 0) {
    const lineBreakIndex = remaining.indexOf('\n');
    if (lineBreakIndex === -1) {
      // 无换行符：处理最后一段文本
      const token = {
        text: remaining,
        scope: scope,
        line: currentLine,
        col: [
          currentCol, // 起始列
          currentCol + remaining.length - 1 // 结束列：核心公式
        ]
      };
      tokens.push(token);
      // 无需更新 currentCol（循环结束）
      break;
    }

    // 有换行符：拆分「换行符前内容」+「换行符」+「剩余文本」
    // 1. 处理换行符前的内容（可能为空，比如 Token 以 \n 开头）
    const beforeLineBreak = remaining.slice(0, lineBreakIndex);
    if (beforeLineBreak) {
      const beforeToken = {
        text: beforeLineBreak,
        scope: scope,
        line: currentLine,
        col: [
          currentCol,
          currentCol + beforeLineBreak.length - 1
        ]
      };
      tokens.push(beforeToken);
      // 同步更新 currentCol：推进到当前 Token 结束列 + 1
      currentCol = beforeToken.col[1] + 1;
    }

    // 2. 处理换行符（兼容 \n 和 \r\n）
    const isCRLF = lineBreakIndex > 0 && remaining[lineBreakIndex - 1] === '\r';
    const lineBreakChar = isCRLF ? remaining.slice(lineBreakIndex - 1, lineBreakIndex + 1) : remaining.slice(lineBreakIndex, lineBreakIndex + 1);
    const lineBreakToken = {
      text: lineBreakChar,
      scope: 'default',
      line: currentLine,
      col: [
        currentCol,
        currentCol + lineBreakChar.length - 1 // 换行符结束列
      ]
    };
    tokens.push(lineBreakToken);

    // 3. 换行后更新状态：行号+1，列号重置为1
    currentLine += 1;
    currentCol = 1;

    // 4. 截断剩余文本（跳过已处理的换行符）
    const sliceStart = isCRLF ? lineBreakIndex - 1 : lineBreakIndex;
    remaining = remaining.slice(sliceStart + lineBreakChar.length);
  }

  return tokens;
}
  /**
   * 改造 highlight 方法：基于二维 rows 生成HTML
   * @param {string} code ES2020代码
   * @returns {string} 按行渲染的高亮HTML
   */
  highlight(code) {
    const rows = this.parse(code); // 获取二维数组
    // 逐行生成HTML
    const rowsHtml = rows.map((rowTokens, rowIndex) => {
      const lineTokensHtml = rowTokens.map(token => {
        const style = this.scopeToStyle[token.scope] || this.scopeToStyle.default;
        return `<span style="${style}">${this.escapeHtml(token.text)}</span>`;
      }).join('');
      // 给每行加行容器，方便前端控制行样式/行号
      return `<div class="code-line line-${rowIndex + 1}">${lineTokensHtml}</div>`;
    }).join('');

    return `<pre style="background: #1E1E1E; padding: 16px; border-radius: 8px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; white-space: pre;"><code>${rowsHtml}</code></pre>`;
  }

  /**
   * 辅助方法：转义HTML特殊字符，避免XSS和渲染异常
   * @param {string} text 原始文本
   * @returns {string} 转义后的文本
   */
  escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/`/g, '&#96;')
      .replace(/\$/g, '&#36;')
      .replace(/\t/g, '&#9;'); // 保留制表符
  }
}
